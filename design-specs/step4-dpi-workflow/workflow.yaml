apiVersion: dpi-ai/v1
kind: DPIWorkflow
metadata:
  id: "wf-crop-loss-subsidy-2026"
  name: "autonomous_multi_channel_farmer_subsidy_system"
  version: "1.0.0"
  sector: "Agriculture"
  governing_body: "State Department of Agriculture & Farmer Welfare"
  legal_mandate: "Sovereign Seasonal Relief & DBT Payment Authorization Order, 2023"

# 🌟 Structural Layer: System Roles and Handshakes
actors:
  public_agent:
    id: "pa-farmer-subsidy-gateway-2026"
    channels: ["whatsapp", "ussd", "voice"]
    languages: ["hi", "en"]
  human_agent:
    id: "caseworker"
    role: "District Agricultural Officer"

# 🌟 Structural Layer: The Governance Block from the Spec
governance:
    owner_agency: "<Ministry of Social Welfare>"
    legal_basis: "<Social Protection Act § 12.3>"
    audit_logging: true
    human_oversight:
      required: true
      escalation_to: "caseworker_supervisor"
      retention_policy: "5y"
    accountability_note: "Public Agents orchestrate steps; institutional authority remains with government."

environmental_rails:
  identity_infrastructure: "MOSIP Decentralized Core Identity Provider Platform"
  data_exchange_infrastructure: "Federated AgriStack Unified Registry System"
  social_protection_infrastructure: "OpenSPP Social Protection Platform Core Registry Engine"
  payment_clearing_infrastructure: "NPCI Aadhaar Payment Bridge System (APBS) / Mojaloop Hub"

ingress_triggers:
  channels:
    - type: "IVR_VOICE"
      interface_id: "SIP_TRUNK_BSNL_HAR_08"
      audio_profile: "mono_16khz_16bit_pcm"
    - type: "WHATSAPP"
      interface_id: "META_WHATSAPP_BUSINESS_API"
    - type: "USSD"
      interface_id: "SS7_SIGTRAN_CARRIER_GATEWAY"

workflow_orchestration:
  steps:
    - step_id: "step_01"
      step_name: "step_01_initiation_and_channel_entry"
      block: "consent_verify"
      type: "governance_gate"
      description: "Capture explicit channel-native citizen opt-in prior to initializing processing"
      inputs:
        session_id: "$.payload.session_id"
        source_identifier: "$.payload.source_phone_number"
        channel_type: "$.payload.ingress_channel"
        ussd_collected_payload: "$.payload.ussd_collected_payload"
      outputs:
        session_id: "string"
        channel_type: "string"
        consent_granted: "boolean"
        ussd_collected_payload: "object"
      parameters:
        blocking_gate: true
        ivr_dtmf_accept_digit: "1"
        whatsapp_optin_payload: "I Accept and Authorize Check"
        ussd_optin_digit: "1"
      on_success: "step_02"
      on_failure: "abort_session"

    - step_id: "step_02"
      step_name: "step_02_speech_to_text_transcription"
      block: "speech_to_text"
      type: "ai_block"
      description: "Convert incoming raw vernacular acoustic streams into written script strings"
      execution_condition: "$.step_01.output.channel_type == 'IVR_VOICE'"
      inputs:
        audio_stream_uri: "$.payload.ivr_audio_stream_uri"
      outputs:
        unstructured_vernacular_string: "string"
      parameters:
        model_adapter: "BHASHINI_ASR_INFERENCE_CLUSTER"
        native_language: "hi-IN"
        filtering_profile: "agricultural_background_noise_attenuation"
        fallback_path: "human_escalate"
        security_interceptors:
          - guardrail_type: "adversarial_ingestion_safeguard"
            action_on_acoustic_anomaly: "FORCE_CONFIDENCE_TO_ZERO"
      on_success: "step_03"
      on_failure: "step_08"

    - step_id: "step_03"
      step_name: "step_03_text_translation_and_normalization"
      block: "translate"
      type: "ai_block"
      description: "Normalize local idioms, terminology, and dialects into standard administrative text"
      execution_condition: "$.step_01.output.channel_type == 'IVR_VOICE' || $.step_01.output.channel_type == 'WHATSAPP'"
      inputs:
        unstructured_text:
          selector:
            ivr_source: "$.step_02.output.unstructured_vernacular_string"
            whatsapp_source: "$.payload.whatsapp_cleartext_string"
      outputs:
        standardized_english_string: "string"
      parameters:
        model_adapter: "BHASHINI_NMT_TRANSLATION_HUB"
        source_dialect: "regional_haryanvi_hindi"
        target_language: "en-IN"
        security_interceptors:
          - guardrail_type: "adversarial_ingestion_safeguard"
            action_on_text_injection: "FORCE_CONFIDENCE_TO_ZERO"
      on_success: "step_04"
      on_failure: "step_08"

    - step_id: "step_04"
      step_name: "step_04_structured_field_entity_extraction"
      block: "structured_extract"
      type: "ai_block"
      description: "Parse standardized dialogue strings into structured system configurations via localized SLM execution"
      execution_condition: "$.step_01.output.channel_type == 'IVR_VOICE' || $.step_01.output.channel_type == 'WHATSAPP'"
      inputs:
        target_text: "$.step_03.output.standardized_english_string"
      outputs:
        extracted_entities: "object"
        extraction_confidence: "float"
      parameters:
        model_runtime: "ON_PREM_LOCAL_SLM_INFERENCE_INSTANCE"
        security_interceptors:
          - guardrail_type: "adversarial_ingestion_safeguard"
            action_on_override_attempt: "FORCE_CONFIDENCE_TO_ZERO"
        response_schema:
          type: "object"
          required: ["farmer_id_cleartext", "district_name", "crop_type", "reported_anomaly"]
          properties:
            farmer_id_cleartext: "string"
            district_name: "string"
            crop_type: "string"
            reported_anomaly: "string"
      on_success: "step_05"
      on_failure: "step_08"

    - step_id: "step_05"
      step_name: "step_05_identity_perimeter_tokenization"
      block: "identity_verify"
      type: "dpi_rail"
      description: "Enforce zero-disk RAM masking by tokenizing identifiers against national database engines"
      inputs:
        raw_national_id:
          selector:
            ussd_source: "$.step_01.output.ussd_collected_payload.farmer_id_cleartext"
            conversational_source: "$.step_04.output.extracted_entities.farmer_id_cleartext"
      outputs:
        tokenized_identity_hash: "string"
      parameters:
        hashing_algorithm: "SHA-256"
        salt_pepper_injection: "ENV_INJECTED_SYSTEM_PEPPER_KEY"
        mosip_interconnect_profile: "volatile_ram_match_only"
      on_success: "step_05_b"
      on_failure: "abort_with_rejection_log"

    - step_id: "step_05_b"
      step_name: "step_05_b_analytical_dbt_transformation_compaction"
      block: "dbt_run_operator"
      type: "dpi_rail"
      description: "Trigger downstream dbt-core compilation layer to deduplicate multi-attempt conversational loop mutations before registry matching"
      execution_condition: "$.step_01.output.channel_type == 'IVR_VOICE' || $.step_01.output.channel_type == 'WHATSAPP'"
      inputs:
        parent_session_id: "$.step_01.output.session_id"
        tokenization_state: "$.step_05.output.tokenized_identity_hash"
      outputs:
        analytical_materialization_cleared: "boolean"
      parameters:
        target_dbt_project: "agristack_dbt_core"
        execution_model_select: "stg_session_extraction_details"
        orchestration_profile: "blocking_warehouse_compile"
      on_success: "step_06"
      on_failure: "step_11"

    - step_id: "step_06"
      step_name: "step_06_agricultural_registry_crossmatch"
      block: "registry_search"
      type: "dpi_rail"
      description: "Cross-examine parcel boundaries, property ownership, and seasonal crop records"
      inputs:
        tokenized_identity_hash: "$.step_05.output.tokenized_identity_hash"
        assertions:
          district_name:
            selector:
              ussd_path: "$.step_01.output.ussd_collected_payload.district_name"
              ai_path: "$.step_04.output.extracted_entities.district_name"
          crop_type:
            selector:
              ussd_path: "$.step_01.output.ussd_collected_payload.crop_type"
              ai_path: "$.step_04.output.extracted_entities.crop_type"
      outputs:
        registry_match_flag: "boolean"
        cadastral_plot_id: "string"
      parameters:
        target_registry: "FEDERATED_AGRISTACK_CORE_GATEWAY"
        matching_logic: "strict_geographic_boundary_intersection"
      on_success: "step_07"
      on_failure: "step_08"

    - step_id: "step_07"
      step_name: "step_07_social_benefits_registry_submission"
      block: "submit_application"
      type: "dpi_rail"
      description: "Stage the verified application parameters inside the central social benefits framework"
      execution_condition: "$.step_06.output.registry_match_flag == true"
      inputs:
        verification_provenance_flag: "$.step_06.output.registry_match_flag"
        cadastral_plot_reference: "$.step_06.output.cadastral_plot_id"
      outputs:
        openspp_case_id: "string"
        registration_status: "string"
      parameters:
        target_api_endpoint: "OPENSPP_SOCIAL_PROTECTION_PLATFORM_APIS"
        submission_mode: "staged_pending_clearance"
      on_success: "step_08"
      on_failure: "step_11"

    - step_id: "step_08"
      step_name: "step_08_governance_threshold_evaluation"
      block: "business_rules_gate"
      type: "governance_gate"
      description: "Deterministic evaluation gate verifying extracted AI metrics and registry match assertions against state policies"
      inputs:
        llm_confidence_score:
          selector:
            ussd_static: 1.00
            conversational_probabilistic: "$.step_04.output.extraction_confidence"
            default_fallback: 0.00
        registry_match_flag:
          selector:
            registry_path: "$.step_06.output.registry_match_flag"
            default_fallback: false
        current_attempt:
          selector:
            payload_path: "$.payload.loop_attempt_id"
            default_fallback: 1
      outputs:
        evaluation_passed: "boolean"
        active_attempt_id: "integer"
      parameters:
        minimum_confidence_threshold: 0.85
        maximum_retry_limit: 3
        engine_evaluation_rules:
          evaluation_passed: "$.inputs.llm_confidence_score >= $.parameters.minimum_confidence_threshold && $.inputs.registry_match_flag == true"
          active_attempt_id: "$.inputs.current_attempt"
      on_success: "step_09"
      on_failure: "step_09"

    - step_id: "step_09"
      step_name: "step_09_governance_routing_engine"
      block: "orchestration_router"
      type: "governance_gate"
      description: "Structural router parsing evaluation flags to trigger direct DBT payouts, edge-channel conversational re-prompts for fresh user inputs, or caseworker staging"
      inputs:
        evaluation_passed: "$.step_08.output.evaluation_passed"
        active_attempt_id: "$.step_08.output.active_attempt_id"
        channel_type: "$.step_01.output.channel_type"
      outputs:
        routing_decision: "string"
      routing_branches:
        passing_track:
          condition: "$.inputs.evaluation_passed == true"
          target_action: "FORWARD_TO_AUTOMATED_PAYOUT_DISBURSEMENT"
          next_step: "step_10"
        reprompt_loop_track:
          condition: "$.inputs.evaluation_passed == false && $.inputs.active_attempt_id < 3 && $.inputs.channel_type != 'USSD'"
          target_action: "TRIGGER_CHANNEL_REPROMPT_INGRESS"
          next_step: "step_12"
        fallback_track:
          condition: "$.inputs.evaluation_passed == false && ($.inputs.active_attempt_id >= 3 || $.inputs.channel_type == 'USSD')"
          target_action: "FORWARD_TO_INCIDENT_TICKET_STAGING"
          next_step: "step_11"

    - step_id: "step_10"
      step_name: "step_10_automated_payout_disbursement"
      block: "payment_disburse"
      type: "dpi_rail"
      description: "Trigger direct treasury direct benefit transfer (DBT) transfer sequences over national payment clearing networks"
      inputs:
        routing_decision:
          selector:
            router_path: "$.step_09.output.routing_decision"
            default_fallback: "FORWARD_TO_AUTOMATED_PAYOUT_DISBURSEMENT"
        openspp_case_id:
          selector:
            registry_path: "$.step_07.output.openspp_case_id"
            default_fallback: "CASE_ID_NOT_FOUND"
      outputs:
        payment_transaction_id: "string"
        payout_clearance_status: "string"
      parameters:
        treasury_rail: "NPCI_Aadhaar_Payment_Bridge_System"
      on_success: "step_12"
      on_failure: "step_11"

    - step_id: "step_11"
      step_name: "step_11_caseworker_incident_staging"
      block: "human_review"
      type: "governance_gate"
      description: "Generate a unique state incident tracking token and stage context parameters inside manual review officer ledgers"
      inputs:
        routing_decision:
          selector:
            router_path: "$.step_09.output.routing_decision"
            default_fallback: "INFRASTRUCTURE_FAULT_ESCALATION"
        loop_counter:
          selector:
            evaluation_path: "$.step_08.output.active_attempt_id"
            default_fallback: 1
      outputs:
        escalation_case_id: "string"
        caseworker_assignment_status: "string"
      parameters:
        caseworker_queue: "District Agricultural Officer Review Ledger Dashboard"
        incident_token_config:
          prefix: "SPP-CASE-"
          generation_mechanism: "prefix_plus_year_plus_random_index"
      on_success: "step_12"
      on_failure: "step_12"

    - step_id: "step_12"
      step_name: "step_12_adaptive_multichannel_confirmation_delivery"
      block: "notification_emit"
      type: "dpi_rail"
      description: "Finalize pipeline actions, translating status flags into user confirmations or channel-native re-prompt loops"
      inputs:
        routing_decision:
          selector:
            router_path: "$.step_09.output.routing_decision"
            default_fallback: "FORWARD_TO_INCIDENT_TICKET_STAGING"
        active_attempt_id:
          selector:
            evaluation_path: "$.step_08.output.active_attempt_id"
            default_fallback: 1
        payment_context:
          selector:
            success_path: "$.step_10.output.payment_transaction_id"
            default_fallback: "null"
        fallback_context:
          selector:
            review_path: "$.step_11.output.escalation_case_id"
            default_fallback: "null"
      parameters:
        notification_engine: "CDAC_Mobile_Seva_Gateway"
        voice_synthesis_engine: "BHASHINI_TTS_EXECUTION_HUB"
        runtime_template_bindings:
          payment_transaction_id: "$.inputs.payment_context"
          escalation_case_id: "$.inputs.fallback_context"
          current_retry_iteration: "$.inputs.active_attempt_id"
      channel_payloads:
        ivr_voice_output:
          action: "SYNTHESIZE_AND_PLAY_AUDIO"
          format: "audio/wav"
          templates:
            success_template: "AUDIO_DISBURSEMENT_SUCCESS_V1"
            reprompt_template: "AUDIO_CLARIFICATION_PROMPT_V3"
            escalation_template: "AUDIO_CASEWORKER_TRANSFER_NOTICE_PHONETIC"
        whatsapp_output:
          action: "TRANSMIT_RICH_MEDIA_CARD"
          format: "application/json"
          templates:
            success_template: "TEXT_DISBURSEMENT_SUCCESS_CARD"
            reprompt_template: "TEXT_CLARIFICATION_MESSAGE_CARD"
            escalation_template: "TEXT_CASEWORKER_ESCALATION_MARKDOWN_CARD"
        ussd_output:
          action: "PUSH_SIGNALING_STRING"
          format: "text/plain"
          templates:
            success_template: "USSD_SUCCESS_STRING"
            reprompt_template: "null"
            escalation_template: "USSD_SHORT_160CHAR_FAIL_STRING"
        sms_output:
          action: "BROADCAST_TRANSACTIONAL_SMS"
          format: "text/plain"
          templates:
            success_template: "SMS_PAYMENT_TXN_RECEIPT"
            reprompt_template: "SMS_REPROMPT_ALERT"
            escalation_template: "SMS_CASEWORKER_ASSIGNED_TICKET"
      on_termination: "commit_session_audit_and_close"

audit:
  log_all_steps: true
  pii_redaction: true
  immutable: true
  audit_logger_block: "audit_log"
  parameters:
    target_storage: "local_postgres_telemetry_log_table"
    enforce_anti_tampering: true
    row_signature_checksum: "SHA-256"
    required_metadata_tokens:
      - "log_entry_id"
      - "session_id"
      - "actor_id"
      - "timestamp_utc"
      - "action_executed"
      - "state_delta_checksum"